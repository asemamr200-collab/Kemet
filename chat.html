<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kemet</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold2:#F0D080;--gold3:#8B6B1A;--gold4:#FFE566;
  --teal:#2E8B8B;--teal2:#5ECFCF;
  --dark:#0A0805;--bg2:#111009;--bg3:#0d1020;
  --text:#e8e0c8;--text2:rgba(232,224,200,0.5);
  --border:rgba(201,168,76,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{height:100vh;height:100dvh;background:var(--dark);font-family:'Cairo',sans-serif;display:flex;flex-direction:column;overflow:hidden;color:var(--text);}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(201,168,76,0.008) 40px,rgba(201,168,76,0.008) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(201,168,76,0.008) 40px,rgba(201,168,76,0.008) 41px);pointer-events:none;z-index:0;}

.screen{display:none;flex-direction:column;height:100%;position:relative;z-index:1;}
.screen.active{display:flex;}

/* SETUP */
.setup{position:fixed;inset:0;background:var(–dark);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;}
.setup.hidden{display:none;}
.setup-logo{font-size:70px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(201,168,76,0.6));text-align:center;}
.setup-title{font-family:‘Cinzel’,serif;font-size:26px;font-weight:900;background:linear-gradient(180deg,#FFE566,#C9A84C,#8B6B1A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:5px;margin-bottom:4px;text-align:center;}
.setup-sub{font-family:‘Cinzel’,serif;font-size:11px;color:var(–teal2);letter-spacing:8px;margin-bottom:40px;text-align:center;}
.setup-card{width:100%;background:linear-gradient(145deg,rgba(18,16,10,0.95),rgba(13,21,37,0.95));border:1px solid var(–border);padding:24px;position:relative;}
.setup-card::before{content:’’;position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(–gold3),var(–gold),var(–gold3),transparent);}
.slabel{font-family:‘Cinzel’,serif;font-size:10px;color:var(–gold);letter-spacing:2px;margin-bottom:8px;}
.av-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.av-opt{width:44px;height:44px;background:rgba(201,168,76,0.04);border:1px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all 0.2s;}
.av-opt.sel{border-color:var(–gold);background:rgba(201,168,76,0.15);box-shadow:0 0 10px rgba(201,168,76,0.2);}
.swrap{position:relative;margin-bottom:14px;}
.swrap::before,.swrap::after{content:’’;position:absolute;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(–gold3),var(–gold),var(–gold3),transparent);z-index:2;}
.swrap::before{top:0;}.swrap::after{bottom:0;}
.sinput{width:100%;background:rgba(201,168,76,0.04);border:none;border-left:1px solid var(–border);border-right:1px solid var(–border);color:var(–text);padding:13px 14px;font-size:15px;font-family:‘Cairo’,sans-serif;outline:none;direction:rtl;}
.sinput::placeholder{color:rgba(201,168,76,0.2);}
.sbtn{width:100%;padding:14px;background:linear-gradient(180deg,#1a0d00,#7a5a10,#C9A84C,#F0D080,#C9A84C,#7a5a10,#1a0d00);border:none;cursor:pointer;font-family:‘Cinzel’,serif;font-size:14px;font-weight:700;color:#1a0d00;letter-spacing:3px;clip-path:polygon(14px 0%,calc(100% - 14px) 0%,100% 50%,calc(100% - 14px) 100%,14px 100%,0% 50%);transition:filter 0.2s;}
.sbtn:hover{filter:brightness(1.1);}

/* TOPBAR */
.topbar{background:linear-gradient(180deg,#1a150a,#0d1020);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;}
.topbar::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(–gold3),var(–gold),var(–gold3),transparent);}
.topbar-logo{flex:1;}
.topbar-title{font-family:‘Cinzel’,serif;font-size:18px;font-weight:700;background:linear-gradient(135deg,var(–gold4),var(–gold),var(–gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;}
.topbar-sub{font-size:9px;color:var(–teal2);letter-spacing:4px;font-family:‘Cinzel’,serif;}
.tbtn{background:none;border:none;color:var(–gold);font-size:19px;cursor:pointer;padding:5px;opacity:0.7;transition:opacity 0.2s;}
.tbtn:hover{opacity:1;}

/* SEARCH */
.search-bar{display:none;background:var(–bg2);padding:8px 14px;flex-shrink:0;position:relative;}
.search-bar::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:1px;background:var(–border);}
.search-bar.show{display:flex;gap:8px;align-items:center;}
.sbox{flex:1;position:relative;}
.sbox::before,.sbox::after{content:’’;position:absolute;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(–gold3),var(–gold),var(–gold3),transparent);z-index:2;}
.sbox::before{top:0;}.sbox::after{bottom:0;}
#searchInput{width:100%;background:rgba(201,168,76,0.04);border:none;border-left:1px solid var(–border);border-right:1px solid var(–border);color:var(–text);padding:9px 12px;font-size:14px;font-family:‘Cairo’,sans-serif;outline:none;direction:rtl;}
#searchInput::placeholder{color:rgba(201,168,76,0.2);}

/* TABS */
.tabs{display:flex;background:var(–bg2);flex-shrink:0;border-bottom:1px solid var(–border);}
.tab{flex:1;background:none;border:none;padding:10px;font-size:11px;font-family:‘Cinzel’,serif;color:rgba(201,168,76,0.4);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;letter-spacing:1px;position:relative;}
.tab.active{color:var(–gold2);border-bottom-color:var(–gold);}
.tbadge{background:var(–gold);color:#1a0d00;font-size:9px;font-weight:700;padding:1px 4px;border-radius:8px;margin-right:3px;}

/* CONV LIST */
.conv-list{flex:1;overflow-y:auto;}
.conv-list::-webkit-scrollbar{width:2px;}
.conv-list::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.1);}

.conv-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(–border);transition:background 0.15s;}
.conv-item:active{background:rgba(201,168,76,0.04);}
.conv-item.pinned{background:rgba(201,168,76,0.02);}

.cav-wrap{position:relative;flex-shrink:0;}
.cav{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1a2a50,#050a1a);border:1.5px solid rgba(201,168,76,0.25);display:flex;align-items:center;justify-content:center;font-size:24px;}
.cav.group{background:linear-gradient(135deg,#1a3a1a,#050f05);}
.cdot{position:absolute;bottom:2px;left:2px;width:12px;height:12px;background:#4CAF50;border-radius:50%;border:2px solid var(–dark);}
.cdot.off{background:#555;}

.cinfo{flex:1;min-width:0;}
.ctop{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.cname{font-size:15px;font-weight:600;color:var(–gold2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65%;}
.ctime{font-size:11px;color:var(–text2);flex-shrink:0;}
.ctime.unread{color:var(–gold);}
.cbot{display:flex;justify-content:space-between;align-items:center;}
.clast{font-size:13px;color:var(–text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:75%;display:flex;align-items:center;gap:3px;}
.cright{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.ubadge{background:linear-gradient(135deg,var(–gold3),var(–gold));color:#1a0d00;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.ubadge.muted{background:rgba(201,168,76,0.15);color:rgba(201,168,76,0.4);}

/* FAB */
.fab{position:fixed;bottom:70px;left:20px;width:54px;height:54px;background:linear-gradient(180deg,#7a5a10,#C9A84C,#F0D080,#C9A84C,#7a5a10);border:none;cursor:pointer;clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 50%,calc(100% - 8px) 100%,8px 100%,0% 50%);display:flex;align-items:center;justify-content:center;font-size:22px;color:#1a0d00;z-index:50;box-shadow:0 4px 20px rgba(201,168,76,0.3);}

/* BOTTOM NAV */
.bnav{background:linear-gradient(180deg,#0d1020,#1a150a);border-top:1px solid var(–border);display:flex;flex-shrink:0;position:relative;}
.bnav::before{content:’’;position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(–gold3),var(–gold),var(–gold3),transparent);}
.nbtn{flex:1;background:none;border:none;padding:9px 5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nicon{font-size:20px;transition:filter 0.2s;position:relative;display:inline-block;}
.nlabel{font-size:9px;font-family:‘Cinzel’,serif;color:rgba(201,168,76,0.35);letter-spacing:1px;}
.nbtn.active .nicon{filter:drop-shadow(0 0 6px rgba(201,168,76,0.6));}
.nbtn.active .nlabel{color:var(–gold2);}
.nbadge{position:absolute;top:-4px;right:-6px;background:var(–gold);color:#1a0d00;font-size:8px;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

/* CHAT SCREEN */
.chat-topbar{background:linear-gradient(180deg,#1a150a,#0d1020);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;}
.chat-topbar::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(–gold3),var(–gold),var(–gold3),transparent);}
.back-btn{background:none;border:none;color:var(–gold);font-size:20px;cursor:pointer;padding:4px;opacity:0.8;}
.chat-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#1a2a50,#050a1a);border:1px solid rgba(201,168,76,0.35);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.chat-info{flex:1;min-width:0;}
.chat-name{font-family:‘Cinzel’,serif;font-size:14px;font-weight:700;color:var(–gold2);letter-spacing:1px;}
.chat-status{font-size:11px;color:var(–teal2);}
.chbtn{background:none;border:none;color:var(–gold);font-size:18px;cursor:pointer;padding:4px;opacity:0.7;}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:10px 12px;background:var(–dark);}
.msgs::-webkit-scrollbar{width:2px;}
.msgs::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.1);}
.date-badge{text-align:center;margin:10px 0;}
.date-badge span{background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.15);color:rgba(201,168,76,0.5);font-size:10px;padding:2px 10px;border-radius:20px;font-family:‘Cinzel’,serif;letter-spacing:1px;}
.sys{text-align:center;font-size:10px;color:rgba(201,168,76,0.25);margin:6px 0;font-family:‘Cinzel’,serif;}

.mrow{display:flex;margin-bottom:4px;animation:mi 0.2s ease;}
@keyframes mi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.mrow.out{justify-content:flex-start;}
.mrow.in{justify-content:flex-end;}
.mbbl{max-width:76%;padding:8px 11px;position:relative;cursor:pointer;}
.mrow.out .mbbl{background:linear-gradient(135deg,rgba(26,42,10,0.95),rgba(15,25,5,0.95));border:1px solid rgba(100,160,50,0.15);border-top:1px solid rgba(201,168,76,0.08);clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%);}
.mrow.in .mbbl{background:linear-gradient(135deg,rgba(13,21,37,0.95),rgba(8,13,28,0.95));border:1px solid rgba(42,82,152,0.2);border-top:1px solid rgba(201,168,76,0.05);clip-path:polygon(0 0,100% 0,100% 100%,8px 100%,0 calc(100% - 8px));}
.mtxt{font-size:14px;color:var(–text);line-height:1.5;word-break:break-word;}
.mmeta{display:flex;align-items:center;gap:4px;margin-top:3px;justify-content:flex-end;}
.mtime{font-size:9px;color:rgba(201,168,76,0.3);}
.mtick{font-size:10px;color:var(–teal2);}
.msender{font-size:10px;color:var(–gold);font-weight:700;margin-bottom:2px;}

/* Typing */
.typing-wrap{padding:4px 12px;display:none;}
.typing-wrap.show{display:flex;justify-content:flex-end;}
.tbbl{background:rgba(13,21,37,0.9);border:1px solid rgba(42,82,152,0.2);padding:7px 12px;display:inline-flex;gap:4px;align-items:center;clip-path:polygon(0 0,100% 0,100% 100%,8px 100%,0 calc(100% - 8px));}
.dot{width:5px;height:5px;background:var(–gold);border-radius:50%;animation:bounce 1.2s infinite;opacity:0.5;}
.dot:nth-child(2){animation-delay:0.2s;}.dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);opacity:1;}}

/* Reply bar */
.rbar{display:none;background:rgba(26,42,10,0.5);border-top:1px solid var(–border);padding:7px 14px;flex-shrink:0;}
.rbar.show{display:flex;align-items:center;gap:8px;}
.rline{width:3px;background:var(–gold);border-radius:2px;align-self:stretch;flex-shrink:0;}
.rinfo{flex:1;}
.rname{font-size:10px;color:var(–gold);font-weight:700;}
.rtxt{font-size:11px;color:var(–text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rx{background:none;border:none;color:rgba(201,168,76,0.4);font-size:16px;cursor:pointer;}

/* Emoji */
.epanel{display:none;background:var(–bg3);flex-direction:column;flex-shrink:0;position:relative;}
.epanel::before{content:’’;position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(–gold3),var(–gold),var(–gold3),transparent);}
.epanel.open{display:flex;}
.etabs{display:flex;border-bottom:1px solid var(–border);overflow-x:auto;}
.etabs::-webkit-scrollbar{display:none;}
.etab{background:none;border:none;padding:7px 11px;font-size:10px;font-family:‘Cinzel’,serif;color:rgba(201,168,76,0.4);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.2s;letter-spacing:1px;}
.etab.active{color:var(–gold2);border-bottom-color:var(–gold);}
.egrid{display:flex;flex-wrap:wrap;padding:8px;gap:5px;max-height:130px;overflow-y:auto;}
.ebtn{background:rgba(201,168,76,0.04);border:1px solid rgba(201,168,76,0.1);border-radius:4px;width:38px;height:38px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(–gold2);}
.ebtn:active{background:rgba(201,168,76,0.18);}

/* Input */
.iarea{background:linear-gradient(180deg,#0d1020,#1a150a);border-top:1px solid var(–border);padding:8px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;position:relative;}
.iarea::before{content:’’;position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(–gold3),var(–gold),var(–gold3),transparent);}
.ibtn{background:none;border:none;color:var(–gold);font-size:18px;cursor:pointer;opacity:0.55;padding:4px;flex-shrink:0;}
.ibtn:hover{opacity:0.9;}
.ibox{flex:1;position:relative;}
.ibox::before,.ibox::after{content:’’;position:absolute;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(–gold3),var(–gold),var(–gold3),transparent);z-index:2;}
.ibox::before{top:0;}.ibox::after{bottom:0;}
#msgInput{width:100%;background:rgba(26,42,10,0.3);border:none;border-left:1px solid rgba(201,168,76,0.15);border-right:1px solid rgba(201,168,76,0.15);color:var(–text);padding:9px 12px;font-size:14px;font-family:‘Cairo’,sans-serif;outline:none;resize:none;max-height:90px;direction:rtl;line-height:1.4;}
#msgInput::placeholder{color:rgba(201,168,76,0.2);}
.sbtn{width:40px;height:40px;background:linear-gradient(180deg,#7a5a10,#C9A84C,#F0D080,#C9A84C,#7a5a10);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;clip-path:polygon(6px 0%,calc(100% - 6px) 0%,100% 50%,calc(100% - 6px) 100%,6px 100%,0% 50%);color:#1a0d00;flex-shrink:0;transition:filter 0.2s;}
.sbtn:hover{filter:brightness(1.1);}
.sbtn:active{filter:brightness(0.9);}

/* CONN */
.conn{display:none;padding:5px;text-align:center;font-size:11px;flex-shrink:0;}
.conn.show{display:block;}
.conn.ok{background:rgba(50,200,100,0.1);color:#55cc88;border-bottom:1px solid rgba(50,200,100,0.2);}
.conn.err{background:rgba(255,68,68,0.1);color:#ff8888;border-bottom:1px solid rgba(255,68,68,0.2);}
.conn.wait{background:rgba(255,165,0,0.1);color:#ffaa55;border-bottom:1px solid rgba(255,165,0,0.2);}

/* CTX */
.ctx{display:none;position:fixed;background:linear-gradient(135deg,#1a150a,#0d1020);border:1px solid var(–border);border-top:1px solid var(–gold3);z-index:500;min-width:155px;box-shadow:0 10px 30px rgba(0,0,0,0.6);}
.ctx.show{display:block;}
.cxi{padding:10px 14px;font-size:13px;color:var(–text);cursor:pointer;display:flex;align-items:center;gap:8px;}
.cxi:hover{background:rgba(201,168,76,0.07);}
.cxi.red{color:#ff7070;}
.cxd{height:1px;background:var(–border);}

/* OVERLAY */
.ovl{display:none;position:fixed;inset:0;z-index:400;}
.ovl.show{display:block;}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:600;align-items:flex-end;}
.modal.open{display:flex;}
.msheet{width:100%;background:linear-gradient(180deg,#1a150a,#0d1020);border-top:1px solid var(–border);border-radius:20px 20px 0 0;padding:20px;position:relative;max-height:85vh;overflow-y:auto;}
.msheet::before{content:’’;position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(–gold3),var(–gold),var(–gold3),transparent);}
.mhandle{width:36px;height:3px;background:rgba(201,168,76,0.2);border-radius:2px;margin:0 auto 16px;}
.mtitle{font-family:‘Cinzel’,serif;font-size:14px;color:var(–gold2);text-align:center;margin-bottom:16px;letter-spacing:2px;}
.mfield{width:100%;background:rgba(201,168,76,0.04);border:none;border-top:1px solid var(–border);border-bottom:1px solid var(–border);border-left:1px solid var(–border);border-right:1px solid var(–border);color:var(–text);padding:11px 12px;font-size:14px;font-family:‘Cairo’,sans-serif;outline:none;direction:rtl;margin-bottom:10px;}
.mfield::placeholder{color:rgba(201,168,76,0.2);}
.mbtn{width:100%;padding:13px;background:linear-gradient(180deg,#1a0d00,#7a5a10,#C9A84C,#F0D080,#C9A84C,#7a5a10,#1a0d00);border:none;cursor:pointer;font-family:‘Cinzel’,serif;font-size:13px;font-weight:700;color:#1a0d00;letter-spacing:2px;clip-path:polygon(12px 0%,calc(100% - 12px) 0%,100% 50%,calc(100% - 12px) 100%,12px 100%,0% 50%);margin-bottom:8px;}
.mcancel{width:100%;padding:10px;background:none;border:none;color:rgba(201,168,76,0.4);font-family:‘Cairo’,sans-serif;font-size:13px;cursor:pointer;}
</style>

</head>
<body>

<!-- SETUP -->

<div class="setup" id="setup">
  <div class="setup-logo">𓁤</div>
  <div class="setup-title">KEMET</div>
  <div class="setup-sub">✦ EGYPT ✦</div>
  <div class="setup-card">
    <div class="slabel">𓂀 اختار أفاتار</div>
    <div class="av-grid">
      <div class="av-opt sel" onclick="pickAv('𓁤',this)">𓁤</div>
      <div class="av-opt" onclick="pickAv('𓁦',this)">𓁦</div>
      <div class="av-opt" onclick="pickAv('𓅃',this)">𓅃</div>
      <div class="av-opt" onclick="pickAv('𓆣',this)">𓆣</div>
      <div class="av-opt" onclick="pickAv('𓋹',this)">𓋹</div>
      <div class="av-opt" onclick="pickAv('𓂀',this)">𓂀</div>
      <div class="av-opt" onclick="pickAv('𓅀',this)">𓅀</div>
      <div class="av-opt" onclick="pickAv('𓃒',this)">𓃒</div>
    </div>
    <div class="slabel" style="margin-top:4px">𓂀 اسمك</div>
    <div class="swrap">
      <input class="sinput" id="nameIn" placeholder="اكتب اسمك..." maxlength="20">
    </div>

<script>
const SUPA_URL = 'https://niusodmwjsdffxclnare.supabase.co';
const SUPA_KEY = 'sb_publishable_QA5S39W7ZH6rkjXDkA-DqQ_rNc7nOgy';

let myName = '', myAvatar = '𓁤', newAvatar = '𓁤';
let conversations = [], currentConv = null, ctxId = null;
let replyingTo = null, currentTab = 'all';
let pollInterval = null, lastMsgTime = new Date(0).toISOString();
let voiceTimer = null, voiceSecs = 0;

// ===== CHECK LOGIN =====
function checkLogin() {
  const logged = sessionStorage.getItem('kemet_logged');
  if (logged === 'true') {
    myName = sessionStorage.getItem('kemet_name') || 'مستخدم';
    myAvatar = sessionStorage.getItem('kemet_avatar') || '𓁤';
    document.getElementById('setup').classList.add('hidden');
    loadConvs();
  }
}

// ===== SETUP =====
function pickAv(e, el) {
  document.querySelectorAll('.av-opt').forEach(x => x.classList.remove('sel'));
  el.classList.add('sel'); myAvatar = e;
}

async function joinApp() {
  const name = document.getElementById('nameIn').value.trim();
  if (!name) { alert('اكتب اسمك!'); return; }
  myName = name;
  document.getElementById('setup').classList.add('hidden');
  await loadConvs();
}

// ===== API =====
async function api(path, opts = {}) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${SUPA_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...opts.headers
    }
  });
  const t = await r.text();
  return t ? JSON.parse(t) : [];
}

// ===== CONVERSATIONS =====
async function loadConvs() {
  setConn('wait', '⏳ جاري التحميل...');
  try {
    let data = await api('conversations?order=created_at.desc');
    if (!data.length) {
      // Create default conversations
      await api('conversations', {method:'POST', body: JSON.stringify([
        {name:'فرعون الشمال', avatar:'𓁤', last_msg:'أهلاً في كيمت 🏛️', last_time:'9:41', unread:2},
        {name:'نفرتيتي', avatar:'𓁦', last_msg:'كيمت - حيث الحضارة بدأت ✨', last_time:'9:30', unread:1},
        {name:'مجموعة الفراعنة', avatar:'𓋹', is_group:true, last_msg:'𓂀 عين حورس تحرسكم', last_time:'أمس', unread:5},
      ])});
      data = await api('conversations?order=created_at.desc');
    }
    conversations = data;
    renderList();
    setConn('ok', '✅ متصل بكيمت');
    setTimeout(() => document.getElementById('connBar').classList.remove('show'), 2000);
  } catch(e) {
    setConn('err', '❌ خطأ: ' + e.message);
  }
}

function setConn(type, text) {
  const el = document.getElementById('connBar');
  el.className = `conn ${type} show`;
  el.textContent = text;
}

function renderList(filter = '') {
  let list = [...conversations];
  if (currentTab === 'unread') list = list.filter(c => c.unread > 0);
  if (currentTab === 'groups') list = list.filter(c => c.is_group);
  if (filter) list = list.filter(c => c.name.includes(filter));
  list.sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0));

  const total = conversations.reduce((a,c) => a + (c.unread||0), 0);
  document.getElementById('allBadge').textContent = total;
  const badge = document.getElementById('chatsBadge');
  badge.textContent = total;
  badge.style.display = total ? 'flex' : 'none';

  document.getElementById('convList').innerHTML = list.map(c => `
    <div class="conv-item ${c.pinned?'pinned':''}"
      onclick="openChat('${c.id}')"
      oncontextmenu="showCtx(event,'${c.id}')"
      ontouchstart="tStart(event,'${c.id}')" ontouchend="tEnd()">
      <div class="cav-wrap">
        <div class="cav ${c.is_group?'group':''}">${c.avatar||'𓁤'}</div>
        <div class="cdot"></div>
      </div>
      <div class="cinfo">
        <div class="ctop">
          <div class="cname">${c.pinned?'📌 ':''}${c.name}</div>
          <div class="ctime ${c.unread?'unread':''}">${c.last_time||''}</div>
        </div>
        <div class="cbot">
          <div class="clast">${c.last_msg||'ابدأ المحادثة...'}</div>
          <div class="cright">
            ${c.muted?'<span style="font-size:11px">🔕</span>':''}
            ${c.unread>0?`<div class="ubadge ${c.muted?'muted':''}">${c.unread}</div>`:''}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

// ===== OPEN CHAT =====
async function openChat(id) {
  currentConv = conversations.find(c => c.id === id);
  if (!currentConv) return;

  // Mark as read
  currentConv.unread = 0;
  await api(`conversations?id=eq.${id}`, {method:'PATCH', body: JSON.stringify({unread:0})});
  renderList();

  document.getElementById('cAv').textContent = currentConv.avatar || '𓁤';
  document.getElementById('cName').textContent = currentConv.name;
  document.getElementById('cStatus').textContent = 'متصل الآن 🟢';

  document.getElementById('homeScr').classList.remove('active');
  document.getElementById('chatScr').classList.add('active');

  await loadMsgs();
  startPoll();
}

async function loadMsgs() {
  const wrap = document.getElementById('msgs');
  wrap.innerHTML = '<div class="date-badge"><span>✦ اليوم ✦</span></div>';
  try {
    const msgs = await api(`messages?conv_id=eq.${currentConv.id}&order=created_at.asc&limit=50`);
    msgs.forEach(m => addMsgEl(m));
    if (msgs.length) lastMsgTime = msgs[msgs.length-1].created_at;
    wrap.scrollTop = wrap.scrollHeight;
  } catch(e) {}
}

function startPoll() {
  if (pollInterval) clearInterval(pollInterval);
  lastMsgTime = new Date(Date.now() - 1000).toISOString();
  pollInterval = setInterval(async () => {
    try {
      const msgs = await api(`messages?conv_id=eq.${currentConv?.id}&created_at=gt.${encodeURIComponent(lastMsgTime)}&order=created_at.asc`);
      msgs.forEach(m => {
        if (m.sender_name !== myName) {
          addMsgEl(m);
          lastMsgTime = m.created_at;
          document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
        }
      });
    } catch(e) {}
  }, 2000);
}

function goBack() {
  if (pollInterval) clearInterval(pollInterval);
  document.getElementById('chatScr').classList.remove('active');
  document.getElementById('homeScr').classList.add('active');
  currentConv = null;
}

function addMsgEl(msg) {
  const isMine = msg.sender_name === myName || msg._mine;
  const wrap = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = `mrow ${isMine ? 'out' : 'in'}`;
  const time = new Date(msg.created_at).toLocaleTimeString('ar', {hour:'2-digit',minute:'2-digit'});
  div.innerHTML = `
    <div class="mbbl">
      ${!isMine&&currentConv?.is_group?`<div class="msender">${msg.sender_avatar||'𓁤'} ${msg.sender_name}</div>`:''}
      ${msg.reply_to?`<div style="background:rgba(201,168,76,0.08);border-right:2px solid var(--gold);padding:4px 8px;margin-bottom:4px;font-size:11px;color:var(--text2);">${msg.reply_to}</div>`:''}
      <div class="mtxt">${msg.text}</div>
      <div class="mmeta">
        <span class="mtime">${time}</span>
        ${isMine?'<span class="mtick">✓✓</span>':''}
      </div>
    </div>`;
  wrap.appendChild(div);
}

async function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !currentConv) return;

  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  // Show instantly
  const tempMsg = {text, sender_name:myName, sender_avatar:myAvatar, created_at:now.toISOString(), _mine:true, reply_to: replyingTo};
  addMsgEl(tempMsg);
  input.value = ''; input.style.height = 'auto';
  cancelReply();
  document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;

  // Save to DB
  try {
    const saved = await api('messages', {
      method:'POST',
      body: JSON.stringify({
        conv_id: currentConv.id,
        sender_name: myName,
        sender_avatar: myAvatar,
        text,
        reply_to: replyingTo || null
      })
    });
    if (saved?.[0]) lastMsgTime = saved[0].created_at;

    // Update conv
    await api(`conversations?id=eq.${currentConv.id}`, {
      method:'PATCH',
      body: JSON.stringify({last_msg:text, last_time:timeStr})
    });
    currentConv.last_msg = text; currentConv.last_time = timeStr;
  } catch(e) { console.error(e); }
}

// REPLY
function cancelReply() {
  replyingTo = null;
  document.getElementById('rbar').classList.remove('show');
}

// CTX MENU
let touchTimer = null;
function tStart(e, id) { touchTimer = setTimeout(() => showCtx(e, id), 600); }
function tEnd() { clearTimeout(touchTimer); }

function showCtx(e, id) {
  e.preventDefault();
  ctxId = id;
  const menu = document.getElementById('ctx');
  const y = e.clientY || e.touches?.[0]?.clientY || 200;
  menu.style.top = Math.min(y, window.innerHeight-180) + 'px';
  menu.style.right = '16px';
  menu.classList.add('show');
  document.getElementById('ovl').classList.add('show');
}

function closeCtx() {
  document.getElementById('ctx').classList.remove('show');
  document.getElementById('ovl').classList.remove('show');
  ctxId = null;
}

async function ctxMute() {
  const c = conversations.find(x => x.id === ctxId);
  if (c) {
    c.muted = !c.muted;
    await api(`conversations?id=eq.${ctxId}`, {method:'PATCH', body:JSON.stringify({muted:c.muted})});
    renderList();
  }
  closeCtx();
}

async function ctxPin() {
  const c = conversations.find(x => x.id === ctxId);
  if (c) {
    c.pinned = !c.pinned;
    await api(`conversations?id=eq.${ctxId}`, {method:'PATCH', body:JSON.stringify({pinned:c.pinned})});
    renderList();
  }
  closeCtx();
}

async function ctxRead() {
  const c = conversations.find(x => x.id === ctxId);
  if (c) {
    c.unread = 0;
    await api(`conversations?id=eq.${ctxId}`, {method:'PATCH', body:JSON.stringify({unread:0})});
    renderList();
  }
  closeCtx();
}

async function ctxDel() {
  await api(`conversations?id=eq.${ctxId}`, {method:'DELETE'});
  conversations = conversations.filter(c => c.id !== ctxId);
  renderList();
  closeCtx();
}

// TABS
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// SEARCH
function toggleSearch() {
  const b = document.getElementById('searchBar');
  b.classList.toggle('show');
  if (b.classList.contains('show')) document.getElementById('searchInput').focus();
}
function filterList() { renderList(document.getElementById('searchInput').value.trim()); }

// NEW CONV
function pickNewAv(e, el) {
  document.querySelectorAll('#newAvGrid .av-opt').forEach(x => x.classList.remove('sel'));
  el.classList.add('sel'); newAvatar = e;
}

async function createConv() {
  const name = document.getElementById('newName').value.trim();
  if (!name) return;
  const msg = document.getElementById('newMsg').value.trim();
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  try {
    const saved = await api('conversations', {
      method:'POST',
      body: JSON.stringify({name, avatar:newAvatar, last_msg:msg||'ابدأ المحادثة...', last_time:timeStr, unread:0})
    });
    if (saved?.[0]) {
      conversations.unshift(saved[0]);
      if (msg) await api('messages', {method:'POST', body:JSON.stringify({conv_id:saved[0].id, sender_name:myName, sender_avatar:myAvatar, text:msg})});
    }
    renderList();
    closeModal('newModal');
    if (saved?.[0]) openChat(saved[0].id);
  } catch(e) { alert('خطأ: ' + e.message); }
}

// CALLS
function makeCall(type) {
  const room = 'kemet-' + currentConv?.name?.replace(/\s/g,'-') + '-' + Date.now();
  window.open(`https://meet.jit.si/${room}`, '_blank');
}

// NAV
function switchNav(tab, btn) {
  document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab !== 'chats') alert({status:'𓋹 الحالات قريباً!', calls:'📞 المكالمات قريباً!', settings:'⚙️ الإعدادات قريباً!'}[tab]);
}

// EMOJI
const ES = {
  hiero:['𓀀','𓀁','𓀂','𓀃','𓀄','𓀅','𓀆','𓀇','𓀈','𓀉','𓀊','𓀋','𓀌','𓀍','𓀎','𓀏','𓀐','𓀑','𓀒','𓀓','𓀔','𓀕','𓀖','𓀗','𓀘','𓀙','𓀚','𓀛','𓀜','𓀝','𓀞','𓀟','𓀠','𓀡','𓀢','𓀣','𓀤','𓀥'],
  gods:['𓁀','𓁁','𓁂','𓁃','𓁄','𓁅','𓁆','𓁇','𓁈','𓁉','𓁊','𓁋','𓁌','𓁍','𓁎','𓁏','𓁐','𓁑','𓁒','𓁓','𓁔','𓁕','𓁖','𓁗','𓁘','𓁙','𓁚','𓁛','𓁜','𓁝','𓁞','𓁟','𓁠','𓁡','𓁢','𓁣','𓁤','𓁥'],
  nature:['𓃀','𓃁','𓃂','𓃃','𓃄','𓃅','𓅀','𓅁','𓅂','𓅃','𓅄','𓅅','𓅆','𓅇','𓅈','𓅉','𓅊','𓅋','𓅌','𓅍','𓅎','𓅏','𓅐','𓅑','𓅒','𓅓'],
  symbols:['𓋹','𓂀','𓆣','𓇳','𓏲','𓎛','𓈖','𓅓','𓆑','𓂋','𓌀','𓌁','𓍀','𓍁','𓎀','𓎁','𓏀','𓏁','𓐀','𓐁','𓄀','𓄁','𓄂'],
  normal:['😊','😂','❤️','👍','🔥','✨','👋','🙏','💪','😎','🎉','🏛️','👑','⚡','🌙','⭐','💛','🫶','😍','💯','🎊','🌟','💫']
};

function showETab(tab, btn) {
  document.querySelectorAll('.etab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('egrid').innerHTML = ES[tab].map(e => `<button class="ebtn" onclick="addE('${e}')">${e}</button>`).join('');
}

function toggleEmoji() {
  const p = document.getElementById('epanel');
  if (!p.classList.contains('open')) showETab('hiero', document.querySelector('.etab'));
  p.classList.toggle('open');
}

function addE(e) { const i = document.getElementById('msgInput'); i.value += e; i.focus(); }

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 90) + 'px'; }

function startVoice() { document.getElementById('micBtn').textContent = '🔴'; voiceSecs = 0; voiceTimer = setInterval(() => voiceSecs++, 1000); }
function stopVoice() {
  clearInterval(voiceTimer);
  document.getElementById('micBtn').textContent = '🎙️';
  if (voiceSecs > 0 && currentConv) {
    const dur = `${Math.floor(voiceSecs/60)}:${(voiceSecs%60).toString().padStart(2,'0')}`;
    document.getElementById('msgInput').value = `🎙️ رسالة صوتية ${dur}`;
    sendMsg();
  }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// LOGOUT
function logout() {
  sessionStorage.clear();
  window.location.href = 'login.html';
}

// START
checkLogin();</script>
