<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kemet - الشات</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold2: #F0D080;
  --gold3: #8B6B1A;
  --gold4: #FFE566;
  --blue: #1A3A6B;
  --blue2: #0d1525;
  --teal: #2E8B8B;
  --teal2: #5ECFCF;
  --dark: #0A0805;
  --dark2: #111008;
  --msg-out: #1a2a0a;
  --msg-in: #0d1525;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
height: 100vh;
height: 100dvh;
background: var(–dark);
font-family: ‘Cairo’, sans-serif;
display: flex;
flex-direction: column;
overflow: hidden;
position: relative;
}

body::before {
content:’’;
position:fixed; inset:0;
background:
repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(201,168,76,0.01) 3px, rgba(201,168,76,0.01) 4px),
repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(201,168,76,0.01) 3px, rgba(201,168,76,0.01) 4px);
pointer-events:none; z-index:0;
}

/* ===== HEADER ===== */
.header {
background: linear-gradient(180deg, #13100a 0%, #0d1020 100%);
border-bottom: 1px solid rgba(201,168,76,0.2);
padding: 10px 14px;
display: flex;
align-items: center;
gap: 12px;
position: relative;
z-index: 10;
flex-shrink: 0;
}

.header::after {
content:’’;
position:absolute; bottom:0; left:0; right:0; height:1px;
background:linear-gradient(to right, transparent, var(–gold3), var(–gold), var(–gold3), transparent);
}

.back-btn {
background:none; border:none;
color:var(–gold); font-size:20px;
cursor:pointer; padding:4px;
opacity:0.7;
}

.avatar {
width:42px; height:42px;
border-radius:50%;
background:linear-gradient(135deg, #1a2a50, #050a1a);
border:1px solid rgba(201,168,76,0.4);
display:flex; align-items:center; justify-content:center;
font-size:20px;
position:relative;
flex-shrink:0;
}

.avatar::after {
content:’’;
position:absolute; bottom:1px; left:1px;
width:10px; height:10px;
background:#4CAF50;
border-radius:50%;
border:2px solid var(–dark);
}

.header-info { flex:1; }

.header-name {
font-family:‘Cinzel’, serif;
font-size:14px; font-weight:700;
color:var(–gold2);
letter-spacing:1px;
}

.header-status {
font-size:11px;
color:var(–teal2);
opacity:0.8;
}

.header-actions {
display:flex; gap:14px;
}

.action-btn {
background:none; border:none;
color:var(–gold); font-size:18px;
cursor:pointer; opacity:0.7;
transition:opacity 0.2s;
padding:4px;
}
.action-btn:hover { opacity:1; }

/* ===== MESSAGES AREA ===== */
.messages-wrap {
flex:1;
overflow-y:auto;
overflow-x:hidden;
padding:14px 12px;
position:relative;
z-index:1;
scroll-behavior:smooth;
}

.messages-wrap::-webkit-scrollbar { width:3px; }
.messages-wrap::-webkit-scrollbar-track { background:transparent; }
.messages-wrap::-webkit-scrollbar-thumb { background:rgba(201,168,76,0.2); border-radius:2px; }

/* Date badge */
.date-badge {
text-align:center;
margin:12px 0;
}

.date-badge span {
background:rgba(201,168,76,0.08);
border:1px solid rgba(201,168,76,0.15);
color:rgba(201,168,76,0.5);
font-size:11px;
padding:3px 12px;
border-radius:20px;
font-family:‘Cinzel’,serif;
letter-spacing:1px;
}

/* Messages */
.msg-row {
display:flex;
margin-bottom:6px;
animation:msgIn 0.3s ease;
}

@keyframes msgIn {
from { opacity:0; transform:translateY(10px); }
to { opacity:1; transform:translateY(0); }
}

.msg-row.out { justify-content:flex-start; }
.msg-row.in { justify-content:flex-end; }

.msg-bubble {
max-width:75%;
padding:9px 13px;
position:relative;
border-radius:0;
}

/* Outgoing message - right to left style */
.msg-row.out .msg-bubble {
background:linear-gradient(135deg, rgba(26,42,10,0.95), rgba(15,25,5,0.95));
border:1px solid rgba(100,160,50,0.2);
border-top:1px solid rgba(201,168,76,0.15);
clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
}

/* Incoming message */
.msg-row.in .msg-bubble {
background:linear-gradient(135deg, rgba(13,21,37,0.95), rgba(8,13,28,0.95));
border:1px solid rgba(42,82,152,0.25);
border-top:1px solid rgba(201,168,76,0.1);
clip-path: polygon(0 0, 100% 0, 100% 100%, 10px 100%, 0 calc(100% - 10px));
}

.msg-text {
font-size:14px;
color:#e8e0c8;
line-height:1.5;
word-break:break-word;
}

.msg-meta {
display:flex;
align-items:center;
gap:4px;
margin-top:4px;
justify-content:flex-end;
}

.msg-time {
font-size:10px;
color:rgba(201,168,76,0.35);
}

.msg-tick {
font-size:12px;
color:var(–teal2);
opacity:0.7;
}

/* System message */
.sys-msg {
text-align:center;
margin:8px 0;
}
.sys-msg span {
font-size:11px;
color:rgba(201,168,76,0.3);
font-family:‘Cinzel’,serif;
letter-spacing:1px;
}

/* ===== INPUT AREA ===== */
.input-area {
background:linear-gradient(180deg, #0d1020 0%, #13100a 100%);
border-top:1px solid rgba(201,168,76,0.15);
padding:10px 12px;
display:flex;
align-items:center;
gap:10px;
position:relative;
z-index:10;
flex-shrink:0;
}

.input-area::before {
content:’’;
position:absolute; top:0; left:0; right:0; height:1px;
background:linear-gradient(to right, transparent, var(–gold3), var(–gold), var(–gold3), transparent);
}

.attach-btn {
background:none; border:none;
color:var(–gold); font-size:20px;
cursor:pointer; opacity:0.5;
padding:6px; flex-shrink:0;
transition:opacity 0.2s;
}
.attach-btn:hover { opacity:0.9; }

.input-wrap {
flex:1;
position:relative;
}

.input-wrap::before, .input-wrap::after {
content:’’;
position:absolute; left:0; right:0; height:1px;
background:linear-gradient(to right, transparent, var(–gold3), var(–gold), var(–gold3), transparent);
z-index:2;
}
.input-wrap::before { top:0; }
.input-wrap::after { bottom:0; }

#msgInput {
width:100%;
background:linear-gradient(180deg, rgba(26,42,10,0.3), rgba(13,21,37,0.4));
border:none;
border-left:1px solid rgba(201,168,76,0.2);
border-right:1px solid rgba(201,168,76,0.2);
color:#e8e0c8;
padding:10px 14px;
font-size:14px;
font-family:‘Cairo’,sans-serif;
outline:none;
resize:none;
max-height:100px;
direction:rtl;
line-height:1.4;
}

#msgInput::placeholder { color:rgba(201,168,76,0.2); }
#msgInput:focus {
background:linear-gradient(180deg, rgba(26,42,10,0.5), rgba(13,21,37,0.6));
}

/* Send button */
.send-wrap { position:relative; flex-shrink:0; }

.send-btn {
width:44px; height:44px;
background:linear-gradient(180deg, #7a5a10, #C9A84C, #F0D080, #C9A84C, #7a5a10);
border:none;
cursor:pointer;
display:flex; align-items:center; justify-content:center;
font-size:18px;
transition:all 0.2s;
clip-path:polygon(6px 0%, calc(100% - 6px) 0%, 100% 50%, calc(100% - 6px) 100%, 6px 100%, 0% 50%);
color:#1a0d00;
position:relative;
}

.send-btn::before {
content:’’;
position:absolute; inset:0;
background:linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
}

.send-btn:hover { filter:brightness(1.1); transform:scale(1.05); }
.send-btn:active { filter:brightness(0.9); transform:scale(0.95); }

/* ===== EMOJI PANEL ===== */
.emoji-panel {
display:none;
background:linear-gradient(180deg, #0d1020, #13100a);
border-top:1px solid rgba(201,168,76,0.15);
padding:10px;
flex-wrap:wrap;
gap:8px;
justify-content:center;
z-index:10;
flex-shrink:0;
}

.emoji-panel.open { display:flex; }

.emoji-btn {
background:none; border:none;
font-size:22px; cursor:pointer;
padding:4px; border-radius:4px;
transition:transform 0.15s;
}
.emoji-btn:hover { transform:scale(1.2); }

/* Typing indicator */
.typing-indicator {
display:none;
padding:0 12px 8px;
}

.typing-indicator.show { display:block; }

.typing-bubble {
background:linear-gradient(135deg, rgba(13,21,37,0.9), rgba(8,13,28,0.9));
border:1px solid rgba(42,82,152,0.2);
display:inline-flex;
padding:8px 14px;
gap:4px;
align-items:center;
clip-path:polygon(0 0, 100% 0, 100% 100%, 10px 100%, 0 calc(100% - 8px));
}

.dot {
width:6px; height:6px;
background:var(–gold);
border-radius:50%;
animation:bounce 1.2s infinite;
opacity:0.5;
}
.dot:nth-child(2) { animation-delay:0.2s; }
.dot:nth-child(3) { animation-delay:0.4s; }

@keyframes bounce {
0%,60%,100% { transform:translateY(0); }
30% { transform:translateY(-5px); opacity:1; }
}
</style>

</head>
<body>

<!-- Header -->

<div class="header">
  <button class="back-btn">←</button>
  <div class="avatar">𓁤</div>
  <div class="header-info">
    <div class="header-name">Kemet Chat</div>
    <div class="header-status">متصل الآن 𓂀</div>
  </div>
  <div class="header-actions">
    <button class="action-btn" onclick="startCall('voice')">📞</button>
    <button class="action-btn" onclick="startCall('video')">📹</button>
    <button class="action-btn">⋮</button>
  </div>
</div>

<!-- Messages -->

<div class="messages-wrap" id="messagesWrap">

  <div class="date-badge"><span>✦ اليوم ✦</span></div>

  <div class="sys-msg"><span>𓋹 مرحباً بك في كيمت 𓋹</span></div>

  <div class="msg-row in">
    <div class="msg-bubble">
      <div class="msg-text">أهلاً وسهلاً! 👋 مرحباً بك في مملكة كيمت</div>
      <div class="msg-meta">
        <span class="msg-time">10:00</span>
      </div>
    </div>
  </div>

  <div class="msg-row out">
    <div class="msg-bubble">
      <div class="msg-text">شكراً! سعيد بانضمامي 🏛️</div>
      <div class="msg-meta">
        <span class="msg-time">10:01</span>
        <span class="msg-tick">✓✓</span>
      </div>
    </div>
  </div>

  <div class="msg-row in">
    <div class="msg-bubble">
      <div class="msg-text">كيمت - الأرض السوداء، مصر القديمة الخالدة ✨</div>
      <div class="msg-meta">
        <span class="msg-time">10:02</span>
      </div>
    </div>
  </div>

</div>

<!-- Typing indicator -->

<div class="typing-indicator" id="typingIndicator">
  <div class="typing-bubble">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<!-- Emoji Panel -->

<div class="emoji-panel" id="emojiPanel">
  <button class="emoji-btn" onclick="addEmoji('😊')">😊</button>
  <button class="emoji-btn" onclick="addEmoji('😂')">😂</button>
  <button class="emoji-btn" onclick="addEmoji('❤️')">❤️</button>
  <button class="emoji-btn" onclick="addEmoji('👍')">👍</button>
  <button class="emoji-btn" onclick="addEmoji('🔥')">🔥</button>
  <button class="emoji-btn" onclick="addEmoji('🏛️')">🏛️</button>
  <button class="emoji-btn" onclick="addEmoji('✨')">✨</button>
  <button class="emoji-btn" onclick="addEmoji('👋')">👋</button>
  <button class="emoji-btn" onclick="addEmoji('🙏')">🙏</button>
  <button class="emoji-btn" onclick="addEmoji('💪')">💪</button>
  <button class="emoji-btn" onclick="addEmoji('😎')">😎</button>
  <button class="emoji-btn" onclick="addEmoji('🎉')">🎉</button>
</div>

<!-- Input Area -->

<div class="input-area">
  <button class="attach-btn" onclick="toggleEmoji()">😊</button>
  <div class="input-wrap">
    <textarea id="msgInput" rows="1" placeholder="اكتب رسالة... 𓂀" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
  </div>
  <div class="send-wrap">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
function getTime() {
  const now = new Date();
  return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, 'out');
  input.value = '';
  input.style.height = 'auto';

  // Simulate reply
  showTyping();
  setTimeout(() => {
    hideTyping();
    const replies = [
      'رسالتك وصلت! 𓂀',
      'تم الاستلام ✓✓',
      'الأرض السوداء تسمعك 🏛️',
      'كيمت معك دائماً ✨',
      'الفراعنة يحيونك 👑'
    ];
    addMessage(replies[Math.floor(Math.random()*replies.length)], 'in');
  }, 1500);
}

function addMessage(text, type) {
  const wrap = document.getElementById('messagesWrap');
  const div = document.createElement('div');
  div.className = `msg-row ${type}`;
  div.innerHTML = `
    <div class="msg-bubble">
      <div class="msg-text">${text}</div>
      <div class="msg-meta">
        <span class="msg-time">${getTime()}</span>
        ${type==='out' ? '<span class="msg-tick">✓✓</span>' : ''}
      </div>
    </div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
  document.getElementById('typingIndicator').classList.add('show');
  const wrap = document.getElementById('messagesWrap');
  wrap.scrollTop = wrap.scrollHeight;
}

function hideTyping() {
  document.getElementById('typingIndicator').classList.remove('show');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function toggleEmoji() {
  const panel = document.getElementById('emojiPanel');
  panel.classList.toggle('open');
}

function addEmoji(emoji) {
  const input = document.getElementById('msgInput');
  input.value += emoji;
  input.focus();
}

function startCall(type) {
  alert(type === 'voice' ? '📞 جاري الاتصال...' : '📹 جاري بدء مكالمة الفيديو...');
}
</script>

</body>
</html>
